services:
  postgres:
    image: postgres:16-alpine
    container_name: baithak-postgres
    environment:
      POSTGRES_DB: baithakdb
      POSTGRES_USER: baithak
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-baithakpass}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baithak -d baithakdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: baithak-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-devredis}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-devredis}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build: .
    container_name: baithak-api
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://baithak:${POSTGRES_PASSWORD:-baithakpass}@postgres:5432/baithakdb
      REDIS_URL: redis://:${REDIS_PASSWORD:-devredis}@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
