# docker-compose.yml
services:
  postgres:
    image: postgres:16-alpine
    container_name: baithak-postgres
    environment:
      POSTGRES_DB: baithakdb
      POSTGRES_USER: baithak
      POSTGRES_PASSWORD: baithakpass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baithak -d baithakdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: baithak-redis
    command: redis-server --appendonly yes --requirepass devredis
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "devredis", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata: