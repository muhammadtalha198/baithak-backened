name: CI

on:
  pull_request:
    branches:
      - main
      - basic-version
  push:
    branches:
      - main
      - basic-version

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Import check
        run: python -c "from baithak.server import app; print(app.title)"
